<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 Control</title>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; background: #f8f9fa; padding: 2rem; margin: 0; }
        h1 { color: #1a3c5e; margin-bottom: 1.5rem; }
        .info { font-size: 1.1rem; margin: 1rem 0; color: #444; line-height: 1.6; }
        .buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-top: 2rem; }

        button {
            padding: 1rem 2rem; font-size: 1.1rem; border: 4px solid transparent;
            border-radius: 12px; color: white; cursor: pointer;
            transition: all 0.1s ease; opacity: 0.8;
        }

        /* The visual indication: Glow and Scale */
        button.active {
            opacity: 1.0;
            transform: scale(1.1);
            border-color: #1a3c5e; /* Dark blue ring around active choice */
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        #red { background: #e63946; } #green { background: #2a9d8f; } #blue { background: #457b9d; }
        #white { background: #ffffff; color: #333; border: 1px solid #ccc; } #off { background: #6c757d; }

        #clock, #res-time { font-weight: bold; color: #1a3c5e; }
        .fast { color: #2a9d8f !important; }
        .slow { color: #e63946 !important; }
    </style>
</head>
<body>
    <h1>ESP32-S3 Control Panel</h1>

    <div class="info">
        <strong>IP address:</strong> {{ ip_address }}<br>
        <strong>CPU temperature:</strong> {{ cpu_temp }} °C<br>
        <strong>Local Time:</strong> <span id="clock">Loading...</span><br>
        <strong>Response Time:</strong> <span id="res-time">0</span> ms
    </div>

    <div class="buttons">
        <button id="red" onclick="setColor('red', this)">Red</button>
        <button id="green" onclick="setColor('green', this)">Green</button>
        <button id="blue" onclick="setColor('blue', this)">Blue</button>
        <button id="white" onclick="setColor('white', this)">White</button>
        <button id="off" onclick="setColor('off', this)">Off</button>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleString();
        }
        updateClock();
        setInterval(updateClock, 1000);

        function setColor(colorName, element) {
            const startTime = performance.now();
            const resDisplay = document.getElementById('res-time');

            // Visual feedback: Remove 'active' from all, add to clicked one
            document.querySelectorAll('.buttons button').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            const formData = new URLSearchParams();
            formData.append('color', colorName);

            fetch('/set_color', {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(response => {
                if (response.ok) {
                    const duration = Math.round(performance.now() - startTime);
                    resDisplay.textContent = duration;
                    resDisplay.className = duration < 100 ? 'fast' : 'slow';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                resDisplay.textContent = "Error";
                element.classList.remove('active'); // Remove highlight if failed
            });
        }
    </script>
</body>
</html>
